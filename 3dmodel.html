<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{margin:0;background:#0f1117;color:white;font-family:Arial;height:100vh;display:flex;flex-direction:column}
header{padding:12px;text-align:center;background:#171b26;font-weight:bold}
.container{flex:1;display:flex;flex-wrap:wrap}
.left,.right{flex:1;min-width:320px;position:relative}
video,canvas{position:absolute;inset:0;width:100%;height:100%}
video{object-fit:cover;transform:scaleX(-1)}
#threeContainer{width:100%;height:100%}
.controls{padding:10px;background:#171b26;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button{padding:10px 16px;border:none;border-radius:8px;background:#2563eb;color:white}
</style>
</head>
<body>
<header>Air Draw 3D</header>
<div class="container">
<div class="left">
<video id="video" autoplay playsinline></video>
<canvas id="handCanvas"></canvas>
</div>
<div class="right"><div id="threeContainer"></div></div>
</div>
<div class="controls">
<button id="startBtn">Start Camera</button>
<button id="stopBtn">Stop Camera</button>
<button id="clearBtn">Clear Drawing</button>
<button id="saveBtn">Save Model</button>
</div>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('handCanvas');
const ctx=canvas.getContext('2d');
let drawPoints=[],stream,camera;

function resizeCanvas(){canvas.width=video.clientWidth;canvas.height=video.clientHeight;}
window.addEventListener('resize',resizeCanvas);

const hands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,minDetectionConfidence:0.7,minTrackingConfidence:0.7});

hands.onResults((results)=>{
 resizeCanvas();
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(results.multiHandLandmarks){
  for(const landmarks of results.multiHandLandmarks){
   drawConnectors(ctx,landmarks,HAND_CONNECTIONS,{color:'#00ffcc'});
   drawLandmarks(ctx,landmarks,{color:'#00ffff',radius:3});
   const tip=landmarks[8];
   const x=(1-tip.x)*canvas.width;
   const y=tip.y*canvas.height;
   drawPoints.push({x,y,z:Math.sin(drawPoints.length*0.05)*30});
   if(drawPoints.length>2000) drawPoints.shift();
  }
 }
});

async function startCamera(){
 stream=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=stream;
 camera=new Camera(video,{onFrame:async()=>await hands.send({image:video}),width:640,height:480});
 camera.start();
}
function stopCamera(){
 if(stream) stream.getTracks().forEach(t=>t.stop());
}

const scene=new THREE.Scene();
const cam3=new THREE.PerspectiveCamera(75,1,0.1,1000);
cam3.position.z=200;
const renderer=new THREE.WebGLRenderer({antialias:true});
const holder=document.getElementById('threeContainer');
renderer.setSize(holder.clientWidth,holder.clientHeight);
holder.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,1));
let line;

function update3D(){
 if(drawPoints.length<2) return;
 if(line) scene.remove(line);
 const pts=drawPoints.map(p=>new THREE.Vector3((p.x-canvas.width/2)*0.5,-(p.y-canvas.height/2)*0.5,p.z));
 const geo=new THREE.BufferGeometry().setFromPoints(pts);
 line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x00ffff}));
 scene.add(line);
}
function animate(){
 requestAnimationFrame(animate);
 update3D();
 if(line) line.rotation.y+=0.003;
 renderer.render(scene,cam3);
}
animate();

document.getElementById('startBtn').onclick=startCamera;
document.getElementById('stopBtn').onclick=stopCamera;
document.getElementById('clearBtn').onclick=()=>{drawPoints=[]; if(line) scene.remove(line);};
document.getElementById('saveBtn').onclick=()=>{
 const blob=new Blob([JSON.stringify(drawPoints)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='airdraw3d_model.json';
 a.click();
};
startCamera();
</script>
</body>
</html>
